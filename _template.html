<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$</title>
$for(css)$
  <link rel="stylesheet" href="$css$">
$endfor$
  <style>
    body { max-width: 900px; margin: 0 auto; padding: 2rem; }
    img { max-width: 100%; height: auto; border-radius: 6px; margin: 1rem 0; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #333; }
    th { background: #1a1a2e; }
    blockquote { border-left: 3px solid #4a9eff; padding-left: 1rem; margin-left: 0; color: #aaa; }
    .back-link { margin-bottom: 1.5rem; display: inline-block; }
  </style>
</head>
<body>
  <a class="back-link" href="/">&larr; Back to index</a>
  $body$
</body>
</html>
